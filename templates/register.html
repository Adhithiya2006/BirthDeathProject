<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Civil Registry</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>.flash-fixed{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;width:90%;max-width:480px;}</style>
</head>
<body>
<div class="flash-fixed">
  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
</div>

<div class="auth-page">
  <div class="auth-box" style="max-width:500px;">
    <div class="auth-top">
      <div class="auth-emblem">📋</div>
      <h1>Create Account</h1>
      <p>Register to access Civil Registry services</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="/register" id="regForm">
        <div class="fg" style="margin-bottom:14px;">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" name="name" class="fc" placeholder="As per official documents" required>
        </div>
        <div class="fgrid" style="margin-bottom:14px;">
          <div class="fg">
            <label>Email Address <span class="req">*</span></label>
            <input type="email" name="email" class="fc" placeholder="you@example.com" required>
          </div>
          <div class="fg">
            <label>Mobile Number <span class="req">*</span></label>
            <input type="tel" name="phone" class="fc" pattern="[0-9]{10}" maxlength="10" placeholder="10 digits" required>
          </div>
        </div>
        <div class="fgrid" style="margin-bottom:22px;">
          <div class="fg">
            <label>Password <span class="req">*</span></label>
            <div style="position:relative;">
              <input type="password" name="password" id="pw" class="fc" placeholder="Min 6 characters" required minlength="6" style="padding-right:44px;">
              <button type="button" onclick="togglePw('pw','eyePw')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--muted);padding:0;" id="eyePw">👁</button>
            </div>
          </div>
          <div class="fg">
            <label>Confirm Password <span class="req">*</span></label>
            <div style="position:relative;">
              <input type="password" name="confirm_password" id="cpw" class="fc" placeholder="Repeat password" required style="padding-right:44px;">
              <button type="button" onclick="togglePw('cpw','eyeCpw')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--muted);padding:0;" id="eyeCpw">👁</button>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account →</button>
      </form>
      <div class="auth-foot">Already have an account? <a href="/">Sign In</a></div>
    </div>
  </div>
</div>

<script>
document.getElementById('regForm').addEventListener('submit',function(e){
  if(document.getElementById('pw').value!==document.getElementById('cpw').value){
    e.preventDefault();alert('Passwords do not match.');
  }
});
function togglePw(id, btnId) {
  const input = document.getElementById(id);
  const btn   = document.getElementById(btnId);
  if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
  else                           { input.type = 'password'; btn.textContent = '👁'; }
}
document.querySelectorAll('.alert').forEach(el=>{
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),350);},4000);
});
</script>
</body>
</html>
