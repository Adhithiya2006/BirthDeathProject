<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Civil Registry</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>.flash-fixed{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;width:90%;max-width:460px;}</style>
</head>
<body>
<div class="flash-fixed">
  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
</div>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-top">
      <div class="auth-emblem">🔑</div>
      <h1>Forgot Password</h1>
      <p>Enter your registered email to receive a reset link</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="fg" style="margin-bottom:22px;">
          <label>Registered Email Address</label>
          <input type="email" name="email" class="fc"
                 placeholder="you@example.com" required
                 value="{{ email or '' }}">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Send Reset Link →</button>
      </form>
      <div class="auth-foot" style="margin-top:20px;">
        Remember your password? <a href="{{ url_for('home') }}">Sign In</a>
      </div>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.alert').forEach(el=>{
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),350);},4000);
});
</script>
</body>
</html>
